<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Air Compressor Monitoring | Stage 2</title>

  <!-- Page styles -->
  <link rel="stylesheet" href="style.css">

  <!-- Shared navbar styles -->
  <link rel="stylesheet" href="/shared/navbar.css">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"
    rel="stylesheet">

  <!-- Charts + CSV -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
</head>

<body data-sync-page="aircompressor">

  <!-- =========================
       NAVBAR (SAME AS TEMPERATURE)
  ========================== -->
  <div id="navbar"></div>

  <script src="/shared/navbar.js"></script>
  <script>
    fetch('/shared/navbar.html')
      .then(res => {
        if (!res.ok) throw new Error('Navbar failed to load');
        return res.text();
      })
      .then(html => {
        document.getElementById('navbar').innerHTML = html;
      })
      .catch(err => console.error(err));
  </script>

  <!-- =========================
       PAGE CONTENT
  ========================== -->
  <main class="dashboard-content">

    <header class="dash-header">
      <h1>Air Compressor Monitoring</h1>
      <p class="text-muted">
        Performance analytics from Energy, Flow, and Dewpoint sensors
      </p>
    </header>

    <!-- KPI SUMMARY -->
    <section class="kpi-grid">
      <div class="kpi-card">
        <small class="kpi-label">FLOW (LATEST)</small>
        <div class="kpi-value" id="val-flow">—</div>
      </div>

      <div class="kpi-card">
        <small class="kpi-label">ENERGY (LATEST)</small>
        <div class="kpi-value" id="val-energy">—</div>
      </div>

      <div class="kpi-card">
        <small class="kpi-label">SPECIFIC POWER</small>
        <div class="kpi-value" id="val-efficiency">—</div>
      </div>

      <div class="kpi-card">
        <small class="kpi-label">DEWPOINT</small>
        <div class="kpi-value" id="val-dewpoint">—</div>
      </div>
    </section>

    <!-- CHARTS -->
    <section class="main-grid">
      <div class="card">
        <h3 class="card-title">Flow vs Energy</h3>
        <div class="chart-container">
          <canvas id="efficiencyChart"></canvas>
        </div>
      </div>

      <div class="card">
        <h3 class="card-title">Dewpoint Trend</h3>
        <div class="chart-container">
          <canvas id="dewpointChart"></canvas>
        </div>
      </div>
    </section>

  </main>

  <!-- PAGE LOGIC -->
  <script src="script.js" defer></script>

</body>
</html>
