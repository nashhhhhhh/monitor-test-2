<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kitchen Equipment | Stage 2</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/shared/navbar.css">
    <style>
        :root {
            --bg-color: #f0f2f5;
            --card-bg: #ffffff;
            --text-main: #1a202c;
            --text-muted: #718096;
            --border-color: #e2e8f0;
            --status-ok: #10b981;
            --status-warn: #f59e0b;
            --status-crit: #ef4444;
            --status-off: #94a3b8;
        }
        body {
            background-color: var(--bg-color);
            margin: 0;
            font-family: 'Inter', sans-serif;
            color: var(--text-main);
        }
        .dashboard-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        .page-header {
            background: white;
            padding: 30px 40px;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            margin-bottom: 40px;
        }
        .page-header h1 {
            font-size: 1.8rem;
            font-weight: 800;
            margin: 0;
            letter-spacing: -0.02em;
        }
        .page-header p {
            color: var(--text-muted);
            margin: 5px 0 0 0;
        }
        .health-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
        }
        .status-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid var(--border-color);
            border-left: 8px solid var(--status-off);
            transition: all 0.2s ease-in-out;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 180px;
        }
        .status-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
        }
        .status-card.normal  { border-left-color: var(--status-ok); }
        .status-card.warning { border-left-color: var(--status-warn); }
        .status-card.offline { border-left-color: var(--status-off); opacity: 0.7; }
        .status-card.draft   { border-left-color: #64748b; background: linear-gradient(180deg, #ffffff, #f8fafc); }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
        }
        .card-header h3 {
            font-size: 1.1rem;
            font-weight: 700;
            margin: 0;
            max-width: 70%;
        }
        .badge {
            font-size: 0.7rem;
            font-weight: 900;
            padding: 4px 8px;
            border-radius: 6px;
            text-transform: uppercase;
        }
        .normal  .badge { background: #d1fae5; color: #065f46; }
        .warning .badge { background: #fef3c7; color: #92400e; }
        .offline .badge { background: #f1f5f9; color: #475569; }
        .draft   .badge { background: #e2e8f0; color: #334155; }
        .status-msg {
            font-size: 0.95rem;
            font-weight: 600;
            margin: 0;
        }
        .metric-val {
            font-size: 1.8rem;
            font-weight: 800;
            margin: 10px 0 0 0;
        }
        .metric-val small {
            font-size: 0.9rem;
            color: var(--text-muted);
        }
        .card-footer {
            margin-top: 20px;
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--text-muted);
            text-align: right;
        }
        .loading-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 100px;
            font-weight: 600;
            color: var(--text-muted);
        }
    </style>
</head>
<body data-sync-page="kitchen">
    <div id="navbar"></div>
    <script src="/shared/navbar.js"></script>
    <script>
        fetch('/shared/navbar.html')
            .then(res => res.ok ? res.text() : Promise.reject())
            .then(html => document.getElementById('navbar').innerHTML = html)
            .catch(err => console.error('Navbar load error:', err));
    </script>

    <main class="dashboard-content">
        <div class="page-header">
            <h1>Kitchen Equipment</h1>
            <p>Status overview for all kitchen equipment units</p>
        </div>

        <div class="health-grid" id="equipment-tiles">
            <div class="loading-state">Loading equipment status…</div>
        </div>
    </main>

    <script>
        const equipment = [
            { name: 'Hobart Sanitizer', api: '/api/hobart',      path: '/Kitchen%20Equipment/Hobart/index.html',     metricFn: d => `${d.summary?.cycles_today ?? '--'} cycles today` },
            { name: 'Steambox',         api: '/api/steambox',     path: '/Kitchen%20Equipment/Steambox/index.html',   metricFn: d => { const r = d.readings?.at(-1); return `${r?.avg_chamber_temp?.toFixed(1) ?? '--'} °C`; } },
            { name: 'X-Ray Inspection', api: '/api/xray',         path: '/Kitchen%20Equipment/X-Ray/index.html',      metricFn: d => `${d.summary?.reject_rate_pct?.toFixed(2) ?? '--'}% reject rate` },
            { name: 'Checkweigher',     api: '/api/checkweigher', path: '/Kitchen%20Equipment/Checkweigh/index.html', metricFn: d => `${d.summary?.pass_rate_pct?.toFixed(1) ?? '--'}% pass rate` },
            { name: 'Combi Oven',       draft: true,              path: '/Kitchen%20Equipment/Combi%20Oven/index.html' },
            { name: 'Bratt Pan',        draft: true,              path: '/Kitchen%20Equipment/Bratt%20Pan/index.html' }
        ];

        async function loadTiles() {
            const container = document.getElementById('equipment-tiles');
            const results = await Promise.all(equipment.map(async (eq) => {
                if (eq.draft) {
                    return { ...eq, data: null, error: false };
                }

                try {
                    const res = await fetch(eq.api);
                    const text = await res.text();
                    const data = JSON.parse(text.replace(/: NaN/g, ': null'));
                    return { ...eq, data, error: false };
                } catch (e) {
                    return { ...eq, data: null, error: true };
                }
            }));

            container.innerHTML = '';
            results.forEach(eq => {
                const status  = eq.draft ? 'draft' : (eq.error ? 'offline' : 'normal');
                const badge   = eq.draft ? 'DRAFT' : (eq.error ? 'OFFLINE' : 'ONLINE');
                const msg     = eq.draft ? 'Reserved for future dashboard work' : (eq.error ? 'Unit Unreachable' : 'Unit Operational');
                let metric    = eq.draft ? 'No data connected yet' : '--';
                if (!eq.error && !eq.draft) {
                    try { metric = eq.metricFn(eq.data); } catch (e) { metric = 'Online'; }
                }

                const tile = document.createElement('div');
                tile.className = `status-card ${status}`;
                tile.onclick = () => window.location.href = eq.path;
                tile.innerHTML = `
                    <div class="card-header">
                        <h3>${eq.name}</h3>
                        <span class="badge">${badge}</span>
                    </div>
                    <div class="card-body">
                        <p class="status-msg">${msg}</p>
                        <p class="metric-val">${metric}</p>
                    </div>
                    <div class="card-footer">Investigate Details →</div>
                `;
                container.appendChild(tile);
            });
        }

        loadTiles();
        setInterval(loadTiles, 30000);
    </script>
</body>
</html>
