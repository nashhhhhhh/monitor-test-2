<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SATS Stage 2 | Lighting Control</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <link rel="stylesheet" href="/shared/navbar.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div id="navbar"></div>

    <main class="dashboard-content">
        <header class="page-header">
            <div class="header-left">
                <h1>Lighting & Illumination</h1>
                <p>Real-time status and energy monitoring for Stage 2 lighting zones</p>
            </div>
            <div class="header-right">
                <div class="kpi-card">
                    <span class="label">Total Consumption (Today)</span>
                    <span id="total-lighting-kwh" class="value">0 <small>kWh</small></span>
                </div>
            </div>
        </header>

        <section class="zone-grid" id="zone-container">
            </section>

        <section class="analytics-row">
            <div class="chart-container">
                <h3>Lighting Energy Consumption (24h)</h3>
                <canvas id="lightingTrendChart"></canvas>
            </div>
        </section>
    </main>

    <script src="/shared/navbar.js"></script>
    <script>
        fetch('/shared/navbar.html')
            .then(res => res.text())
            .then(html => document.getElementById('navbar').innerHTML = html);
    </script>

    <script src="script.js" defer></script>
</body>
</html>
