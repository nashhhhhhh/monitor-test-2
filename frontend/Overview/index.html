<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SATS Stage 2 | Unified Command Center</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="/shared/navbar.css">

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="navbar"></div>

    <main class="dashboard-content">
        
        <header class="system-status-header">
            <div class="header-left">
                <h1>System Status Overview</h1>
                <p id="overall-status-text">Synchronizing with Stage 2 Subsystems...</p>
            </div>
            <div class="header-right">
                <div class="sync-info">
                    <span class="label">Last Sync:</span>
                    <span id="last-sync" class="value">--:--:--</span>
                </div>
                <div id="status-indicator-light" class="status-light ok"></div>
            </div>
        </header>

        <div id="global-alert-box" class="alert-banner hidden">
            <span class="alert-icon">⚠️</span>
            <span id="alert-msg">ATTENTION: Critical parameters detected. Immediate investigation required.</span>
        </div>

        <section class="health-grid" id="health-tiles">
            <div class="loading-state">
                <p>Initializing Health Engine...</p>
            </div>
        </section>

    </main>

    <script src="/shared/navbar.js"></script>
    <script>
        fetch('/shared/navbar.html')
            .then(res => {
                if (!res.ok) throw new Error('Navbar failed to load');
                return res.text();
            })
            .then(html => {
                document.getElementById('navbar').innerHTML = html;
            })
            .catch(err => console.error(err));
    </script>

    <script src="script.js" defer></script>

</body>
</html>
