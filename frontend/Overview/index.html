<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SATS Stage 2 | System Overview</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/shared/navbar.css">

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div id="navbar"></div>

  <main class="dashboard-content">
    
    <header class="dash-header">
      <h1>Factory Mission Control</h1>
      <p class="subtitle">Centralized health monitoring across MDB, WTP, and WWTP systems</p>
    </header>

    <div id="global-alert-box" class="alert-banner hidden">
      <span class="alert-icon">⚠️</span>
      <span id="alert-msg">ATTENTION: One or more systems are operating outside safe parameters.</span>
    </div>

    <section class="kpi-grid">
      <div class="kpi-card neutral">
        <div class="kpi-label">Active Alerts</div>
        <div class="kpi-value" id="total-alerts">0</div>
      </div>
      <div class="kpi-card ok">
        <div class="kpi-label">Systems Stable</div>
        <div class="kpi-value" id="systems-stable">--</div>
      </div>
      <div class="kpi-card neutral">
        <div class="kpi-label">Last Heartbeat</div>
        <div class="kpi-value" id="last-sync">--:--:--</div>
      </div>
    </section>

    <section class="overview-grid" id="health-tiles">
      <div class="loading-state">Syncing system health...</div>
    </section>

  </main>

  <script src="/shared/navbar.js"></script>
  <script>
    fetch('/shared/navbar.html')
      .then(res => {
        if (!res.ok) throw new Error('Navbar failed to load');
        return res.text();
      })
      .then(html => {
        document.getElementById('navbar').innerHTML = html;
      })
      .catch(err => console.error(err));
  </script>

  <script src="script.js" defer></script>

</body>
</html>
