<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Stage 2 System – Overview</title>

  <!-- Page-specific styles -->
  <link rel="stylesheet" href="/Overview/style.css">

  <!-- Navbar styles -->
  <link rel="stylesheet" href="/shared/navbar.css">

  <!-- Page script -->
  <script src="/frontend/Overview/script.js" defer></script>
</head>

<body>

  <!-- NAVBAR -->
  <link rel="stylesheet" href="/shared/navbar.css">

  <div id="navbar"></div>

  <script src="/shared/navbar.js"></script>
  <script>
    fetch('/shared/navbar.html')
      .then(res => {
        if (!res.ok) throw new Error('Navbar failed to load');
        return res.text();
      })
      .then(html => {
        document.getElementById('navbar').innerHTML = html;
      })
      .catch(err => console.error(err));
  </script>



  <!-- PAGE CONTENT -->
  <header>
    <h1>Overview</h1>
  </header>

  <section class="kpi-grid">
    <div class="kpi-card ok">
      <h3>Temperature OK</h3>
      <p id="temp-ok">--</p>
    </div>

    <div class="kpi-card warning">
      <h3>Temperature Warning</h3>
      <p id="temp-warning">--</p>
    </div>

    <div class="kpi-card critical">
      <h3>Temperature Critical</h3>
      <p id="temp-critical">--</p>
    </div>

    <div class="kpi-card neutral">
      <h3>Systems Online</h3>
      <p>✔ All</p>
    </div>
  </section>
  <script src="/Overview/script.js"></script>
</body>
</html>
