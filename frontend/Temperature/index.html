<!DOCTYPE html>
<html lang="en">



<head>
  <meta charset="UTF-8">
  <title>Cold Room Monitoring Dashboard</title>

  <!-- Temperature styles -->
  <link rel="stylesheet" href="/Temperature/styles.css">

  <!-- Navbar styles (shared) -->
  <link rel="stylesheet" href="/shared/navbar.css">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"
    rel="stylesheet">
</head>

<body>

  <!-- NAVBAR -->
  <link rel="stylesheet" href="/shared/navbar.css">

  <div id="navbar"></div>

  <script src="/shared/navbar.js"></script>
  <script>
    fetch('/shared/navbar.html')
      .then(res => {
        if (!res.ok) throw new Error('Navbar failed to load');
        return res.text();
      })
      .then(html => {
        document.getElementById('navbar').innerHTML = html;
      })
      .catch(err => console.error(err));
  </script>

  <!-- =========================
       PAGE CONTENT
  ========================== -->
  <header>
    <h1>Temperature Monitoring Dashboard</h1>
    <div class="top-actions">
      <a href="/Temperature/history/index.html" class="btn history-btn">
        View History
      </a>
    </div>
  </header>

  <section class="summary">
    <div class="card req">
      <h2 id="count-req">0</h2>
      <span>Within Requirements</span>
    </div>
    <div class="card tol">
      <h2 id="count-tol">0</h2>
      <span>Within Tolerance</span>
    </div>
    <div class="card out">
      <h2 id="count-out">0</h2>
      <span>Out of Tolerance</span>
    </div>
  </section>

  <section class="controls">
    <button onclick="filterRooms('all')" class="btn">Show All</button>
    <button onclick="filterRooms('req')" class="btn success">Within Requirements</button>
    <button onclick="filterRooms('out')" class="btn danger">Out of Tolerance</button>

    <button id="lockBtn" class="btn lock">Unlock Layout</button>
  </section>

  <section class="legend">
    <div class="legend-item">
      <span class="legend-color req"></span>
      <span>Within Requirements</span>
    </div>
    <div class="legend-item">
      <span class="legend-color out"></span>
      <span>Out of Tolerance</span>
    </div>
  </section>

  <section class="floorplan-wrapper">
    <div id="floorplan-container"></div>
  </section>

  <!-- Temperature logic -->
  <script src="/Temperature/app.js" defer></script>

</body>
</html>
