<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CCTV Monitoring | Stage 2</title>

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="/shared/navbar.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <div id="navbar"></div>

    <main class="dashboard-content">
        <header class="dash-header">
            <div>
                <h1>CCTV System Status</h1>
                <p class="text-muted">Monitoring online/offline logs for security resources</p>
            </div>
            <div class="kpi-pill">
                <span class="kpi-label">TOTAL DEVICES:</span>
                <span class="kpi-value" id="total-devices">0</span>
            </div>
        </header>

        <section class="camera-grid" id="camera-container">
            <div class="status-msg">Initializing system...</div>
        </section>
    </main>

    <script src="/shared/navbar.js"></script>
    <script>
        // Load the shared navbar
        fetch('/shared/navbar.html')
            .then(res => res.text())
            .then(html => document.getElementById('navbar').innerHTML = html)
            .catch(err => console.error("Navbar Error:", err));
    </script>
    <script src="script.js" defer></script>
</body>
</html>
