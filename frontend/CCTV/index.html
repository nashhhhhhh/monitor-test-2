<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CCTV Monitoring | Stage 2</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="/shared/navbar.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div id="navbar"></div>

    <header>
        <div>
            <h1>CCTV System Status</h1>
            <p>Click any zone on the floor plan to filter cameras below</p>
        </div>
    </header>

    <section class="summary">
        <div class="card online-card">
            <h2 id="onlineCount">0</h2>
            <span>Online</span>
        </div>
        <div class="card offline-card">
            <h2 id="offlineCount">0</h2>
            <span>Offline</span>
        </div>
        <div class="card total-card">
            <h2 id="totalCount">0</h2>
            <span>Total Cameras</span>
        </div>
    </section>

    <section class="controls">
        <button onclick="filterRooms('all')" class="btn active" id="btn-all">Show All</button>
        <button onclick="filterRooms('online')" class="btn success" id="btn-online">All Online</button>
        <button onclick="filterRooms('offline')" class="btn danger" id="btn-offline">Has Offline</button>
        <input class="search-bar" id="camera-search" type="text" placeholder="Search camera name or zone...">
        <button id="lockBtn" class="btn lock">Unlock Layout</button>
    </section>

    <section class="legend">
        <div class="legend-item">
            <span class="legend-color" style="background:#22c55e"></span>
            <span>All Online</span>
        </div>
        <div class="legend-item">
            <span class="legend-color" style="background:#f59e0b"></span>
            <span>Mostly Online (&ge;80%)</span>
        </div>
        <div class="legend-item">
            <span class="legend-color" style="background:#ef4444"></span>
            <span>Has Offline Cameras</span>
        </div>
        <div class="legend-item">
            <span class="legend-color" style="background:#475569"></span>
            <span>No Camera Data</span>
        </div>
    </section>

    <section class="floorplan-wrapper">
        <div id="floorplan-container">
            <div class="fp-loading">Loading floor plan…</div>
        </div>
    </section>

    <section class="camera-list-section">
        <div class="zone-sections" id="zone-sections"></div>
    </section>

    <script src="/shared/navbar.js"></script>
    <script>
        fetch('/shared/navbar.html')
            .then(res => res.text())
            .then(html => document.getElementById('navbar').innerHTML = html)
            .catch(err => console.error('Navbar load error:', err));
    </script>
    <script src="script.js" defer></script>
</body>
</html>
